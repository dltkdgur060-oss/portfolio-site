<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio — 이상혁</title>
<style>
  :root{
    --bg: #0a0a0a;
    --charcoal: #1f1f1f;
    --fg: #f5e8c7;
    --accent: #d4af77;
    --muted: #a8a8a8;
  }
  body{
    margin:0;
    background: linear-gradient(180deg, var(--bg) 0%, var(--charcoal) 100%);
    color:var(--fg);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }
  .wrap{
    max-width:960px;
    margin:0 auto;
    padding:0 20px;
    padding-top: 120px;
  }

  .header-row{
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: #0a0a0a;
    backdrop-filter: blur(12px);
    padding: 16px 0;
    border-bottom: 1px solid rgba(212,175,119,0.15);
  }

  .header-content{
    max-width: 960px;
    margin: 0 auto;
    padding: 0 32px 0 32px;
    padding-right: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: auto;
  }

  .title-block h1{
    margin:0;
    font-size:32px;
    font-weight:600;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .title-block p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:15px;
  }

  .arrow-btn{
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
  }
  .arrow-btn button{
    border: 1px solid var(--accent);
    background: transparent;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor:pointer;
    transition: all 0.3s ease;
    overflow: hidden;
  }
  .arrow-btn button:hover{
    background: var(--accent);
    transform: scale(1.08);
  }
  .arrow-btn button img{
    width: 28px;
    height: 28px;
    transition: filter 0.3s ease;
  }
  .arrow-btn button:hover img{
    filter: brightness(0) invert(1);
  }

  .floating-zoom{
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(212,175,119,0.3);
    border-radius: 50px;
    padding: 8px 10px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 9999;
    opacity: 0.8;
    transition: opacity 0.3s ease;
  }
  .floating-zoom:hover{
    opacity: 1;
  }
  .floating-zoom button{
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor:pointer;
    transition: all 0.3s ease;
    font-size: 18px;
  }
  .floating-zoom button:nth-child(2){
    width: 52px;
    font-size: 15px;
  }
  .floating-zoom button:hover{
    background: var(--accent);
    color: #0a0a0a;
    transform: scale(1.08);
  }

  .image-container{
    position:relative;
    width:100%;
    text-align:center;
    overflow: hidden;
    border-radius:16px;
    padding-top: 40px;
    padding-bottom: 0px;
  }
  #portfolioImg{
    max-width:100%;
    height:auto;
    display:block;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    transition: transform 0.25s ease;
    transform-origin: center center;
    cursor: zoom-in;
  }
</style>
</head>
<body>
  <div class="header-row">
    <div class="header-content">
      <div class="title-block">
        <h1>Portfolio</h1>
        <p>2026.03</p>
      </div>
      <div class="arrow-btn">
        <button onclick="prevImage()">
          <img src="https://raw.githubusercontent.com/dltkdgur060-oss/portfolio_images/main/left.png" alt="이전">
        </button>
        <button onclick="nextImage()">
          <img src="https://raw.githubusercontent.com/dltkdgur060-oss/portfolio_images/main/right.png" alt="다음">
        </button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="image-container">
      <img id="portfolioImg"
           src="https://raw.githubusercontent.com/dltkdgur060-oss/portfolio_images/main/4x_Watch.png"
           alt="포트폴리오 대표 이미지">
    </div>
  </div>

  <div class="floating-zoom">
    <button onclick="zoomOut()">−</button>
    <button onclick="resetZoom()">100%</button>
    <button onclick="zoomIn()">＋</button>
  </div>

<script>
  const images = [
    "https://raw.githubusercontent.com/dltkdgur060-oss/portfolio_images/main/4x_Watch.png",
    "https://raw.githubusercontent.com/dltkdgur060-oss/portfolio_images/main/ADDABLE_able-Fit.png"
  ];
  let currentIndex = 0;
  let zoomLevel = 1;
  const imgEl = document.getElementById("portfolioImg");

  function show(i) {
    currentIndex = (i + images.length) % images.length;
    imgEl.src = images[currentIndex];
    resetZoom();

    // ★★★ 핵심: 이미지가 바뀔 때마다 강제로 맨 위로 이동 ★★★
    window.scrollTo({
      top: 0,
      left: 0,
      behavior: "instant"   // 부드럽지 않고 바로 이동
    });
  }

  function nextImage(){ show(currentIndex + 1); }
  function prevImage(){ show(currentIndex - 1); }

  function zoomIn() {
    zoomLevel += 0.08;
    imgEl.style.transform = `scale(${zoomLevel})`;
  }
  function zoomOut() {
    zoomLevel = Math.max(0.7, zoomLevel - 0.08);
    imgEl.style.transform = `scale(${zoomLevel})`;
  }
  function resetZoom() {
    zoomLevel = 1;
    imgEl.style.transform = `scale(1)`;
  }
</script>
</body>
</html>
